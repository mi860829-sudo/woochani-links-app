<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="robots" content="noindex, nofollow" />
  <title>우차니 비밀기지</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    #app-content { display: none !important; }
    #login-screen { display: flex; }
    body.logged-in #app-content { display: block !important; }
    body.logged-in #login-screen { display: none !important; }
  </style>
</head>

<body>
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <h1 class="login-title">우차니 비밀기지</h1>
      <p class="login-desc">로그인 후 이용할 수 있습니다.</p>
      <p id="login-setup" class="login-setup" hidden>
        Vercel 환경 변수(FIREBASE_API_KEY 등 6개)를 설정한 뒤 다시 배포하세요.
      </p>
      <p id="login-error" class="login-error" hidden role="alert"></p>
      <button type="button" id="google-signin" class="google-signin">Google로 로그인</button>
    </div>
  </div>

  <main id="app-content" class="phone">
    <section id="intro" class="page active sky-page">
      <div class="season-mark" id="season-mark">🍁</div>
      <div class="flag-v">V</div>
      <div class="floating-base">
        <div class="base-house"></div>
        <div class="waterfall"></div>
      </div>

      <div class="intro-text">
        <p id="type-line">▌</p>
        <div id="name-box" class="name-box" hidden>
          <input id="pilot-name" maxlength="8" placeholder="이름" />
          <button onclick="savePilot()">등록</button>
        </div>
      </div>
    </section>

    <section id="welcome" class="page sky-page">
      <div class="season-mark">🍁</div>
      <div class="flag-v">V</div>
      <div class="floating-base">
        <div class="base-house"></div>
        <div class="waterfall"></div>
      </div>

      <div class="welcome-text">
        <p id="welcome-line"></p>
      </div>
    </section>

    <section id="home" class="page sky-page">
      <div class="season-mark">🍁</div>
      <div class="flag-v">V</div>
      <div class="floating-base">
        <div class="base-house"></div>
        <div class="waterfall"></div>
      </div>

      <div class="mission-panel">
        <button onclick="goMission('visual')">시인지 탐험</button>
        <button onclick="goMission('math')">수인지 도전</button>
        <button onclick="goMission('korean')">한글 연구</button>
        <button onclick="goMission('english')">영어 여행</button>
      </div>

      <div class="today-count">
        오늘의 임무 완료 <span id="done-count">0</span>/4
      </div>
    </section>

    <section id="mission" class="page focus-page">
      <button class="back-btn" onclick="go('home')">← 돌아가기</button>
      <h1 id="mission-title">미션</h1>
      <p id="mission-desc">오늘의 미션을 시작해요.</p>

      <button class="complete-btn" onclick="completeMission()">완료했어요</button>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.example.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  <script src="script.js"></script>
</body>
</html>
