<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="robots" content="noindex, nofollow" />
  <title>우차니 비밀기지</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    #app-content { display: none !important; }
    #login-screen { display: flex; }
    body.logged-in #app-content { display: block !important; }
    body.logged-in #login-screen { display: none !important; }
  </style>
</head>

<body>
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <h1 class="login-title">우차니 비밀기지</h1>
      <p class="login-desc">로그인 후 이용할 수 있습니다.</p>
      <p id="login-setup" class="login-setup" hidden>
        Vercel 환경 변수(FIREBASE_API_KEY 등 6개)를 설정한 뒤 다시 배포하세요.
      </p>
      <p id="login-error" class="login-error" hidden role="alert"></p>
      <button type="button" id="google-signin" class="google-signin">Google로 로그인</button>
    </div>
  </div>

  <main id="app-content" class="phone">

    <section id="intro" class="page active intro-page">
      <div class="intro-message">
        <p id="type-line"><span class="cursor">▌</span></p>

        <div id="name-box" class="name-box" hidden>
          <input id="pilot-name" maxlength="8" placeholder="이름" />
          <button onclick="savePilot()">등록</button>
        </div>

        <button id="enter-btn" class="enter-btn" onclick="go('home')" hidden>들어가기</button>
      </div>
    </section>

    <section id="home" class="page main-page">
      <div class="mission-panel">
        <button onclick="goMission('visual')">
          <span class="mission-icon">🟢 🧡 🟨 🔺</span>
          <strong>시인지 미션</strong>
        </button>

        <button onclick="goMission('math')">
          <span class="mission-icon">1 2 3 4 5</span>
          <strong>수인지 미션</strong>
        </button>

        <button onclick="goMission('korean')">
          <span class="mission-icon">ㅂ ㅓ ㅂ ㅡ</span>
          <strong>한글 미션</strong>
        </button>

        <button onclick="goMission('english')">
          <span class="mission-icon">English</span>
          <strong>영어 미션</strong>
        </button>
      </div>

      <div class="today-count">
        오늘의 미션<br />
        <span id="done-count">0</span>/4
      </div>

      <button class="admin-btn" onclick="go('admin-lock')">관리실</button>
    </section>

<section id="mission" class="page mission-page">
  <button class="back-btn" onclick="go('home')">← 돌아가기</button>

  <div class="study-card">
    <h1 id="mission-title">오늘의 미션</h1>

    <div id="card-select-view">
      <p class="mission-sub">하고 싶은 카드를 골라요</p>
      <div id="card-list" class="card-list"></div>
    </div>

    <div id="card-play-view" hidden>
      <p id="selected-card-title" class="mission-sub"></p>

      <button class="mission-image-button" onclick="openImageModal()" type="button">
        <img id="selected-card-img" class="mission-img" src="" alt="시인지카드" />
      </button>

      <button class="mission-back-btn" onclick="openVisualMission()" type="button">
        ← 카드 다시 고르기
      </button>

      <div class="timer-circle-wrap">
        <svg width="130" height="130" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="54"
            fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="10"/>
          <circle id="timer-circle" cx="60" cy="60" r="54"
            fill="none" stroke="#5bc7ff" stroke-width="10"
            stroke-linecap="round"
            stroke-dasharray="339.3"
            stroke-dashoffset="0"
            transform="rotate(-90 60 60)"/>
        </svg>
        <span id="timer-text" class="timer-text-inside">10:00</span>
      </div>

      <div class="timer-buttons">
        <button onclick="startTimer()" type="button">▶️</button>
        <button onclick="stopTimer()" type="button">⏸️</button>
      </div>

      <label class="photo-btn">
        📷
        <input id="mission-photo" type="file" accept="image/*" capture="environment" hidden onchange="previewPhoto(event)" />
      </label>

      <img id="photo-preview" class="photo-preview" hidden alt="완성 사진" />

      <button class="complete-btn mission-complete" onclick="completeCardMission()" type="button">✅</button>
    </div>
  </div>

  <div id="clear-effect" class="clear-effect" hidden>
    🎉<br />MISSION CLEAR<br />🎆 🎆 🎆
  </div>
</section>

<div id="image-modal" class="image-modal" hidden onclick="closeImageModal()">
  <button class="image-modal-close" onclick="closeImageModal()" type="button">×</button>
  <img id="modal-card-img" src="" alt="확대 카드" />
</div>

    <section id="admin-lock" class="page focus-page">
      <button class="back-btn" onclick="go('home')">← 돌아가기</button>
      <h1>관리실</h1>
      <p>관리실 암호를 입력하세요.</p>

      <div class="pass-pad">
        <input id="admin-pass" class="admin-input" type="password" placeholder="암호" readonly />

        <div class="number-pad">
          <button onclick="pressPass('1')">1</button>
          <button onclick="pressPass('2')">2</button>
          <button onclick="pressPass('3')">3</button>
          <button onclick="pressPass('4')">4</button>
          <button onclick="pressPass('5')">5</button>
          <button onclick="pressPass('6')">6</button>
          <button onclick="pressPass('7')">7</button>
          <button onclick="pressPass('8')">8</button>
          <button onclick="pressPass('9')">9</button>
          <button onclick="clearPass()">지움</button>
          <button onclick="pressPass('0')">0</button>
          <button onclick="checkAdmin()">입장</button>
        </div>
      </div>
    </section>

    <section id="admin" class="page focus-page">
      <button class="back-btn" onclick="go('home')">← 돌아가기</button>
      <h1>관리실</h1>

      <div class="admin-card">
        <p>현재 파일럿</p>
        <strong id="current-pilot-name">-</strong>
      </div>

      <div class="admin-card">
        <p>파일럿 이름 변경</p>
        <input id="new-pilot-name" class="admin-input" maxlength="8" placeholder="새 이름" />
        <button class="small-btn" onclick="changePilotName()">이름 변경</button>
      </div>

      <div class="admin-card">
        <p>오늘 완료 기록</p>
        <strong><span id="admin-done-count">0</span>/4</strong>
        <button class="small-btn danger" onclick="resetToday()">오늘 기록 초기화</button>
      </div>

      <div class="admin-card">
        <p>시인지 카드 기록 초기화</p>
        <button class="small-btn danger" onclick="resetVisualCards()">시인지 초기화</button>
      </div>
    </section>

  </main>

  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.example.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  <script src="script.js"></script>
</body>
</html>
